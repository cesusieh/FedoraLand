name: fedoraland
description: Clean Hyprland + GTK image (With App Store).

base-image: ghcr.io/ublue-os/base-main
image-version: latest

modules:
  - type: files
    files:
      - source: system
        destination: /

  # --- BLOCO 1: AJUSTES DO SISTEMA ---
  - type: dnf
    install:
      packages:
        # --- Interface & Login ---
        - sddm
        - network-manager-applet
        
        # --- Suporte a Arquivos ---
        - gvfs 
        
        # --- Fontes & Temas ---
        - google-noto-sans-fonts
        - fira-code-fonts
        - adw-gtk3-theme 
        
        # --- Bibliotecas Gráficas ---
        - qt6-qtwayland
        
        # --- Utilitários Extras ---
        - git
        - micro
        - ffmpeg-free

  # --- BLOCO 2: ECOSSISTEMA HYPRLAND ---
  - type: dnf
    repos:
      copr:
        - solopasha/hyprland
    install:
      packages:
        # Core
        - hyprland
        - hyprpaper
        - hyprlock
        - hypridle
        - xdg-desktop-portal-hyprland
        - hyprpolkitagent
        
        # Produtividade
        - hyprpicker
        - hyprsunset
        - cliphist
        - pyprland
        
        # Screenshot
        - grim
        - slurp
        - hyprshot
        - satty
        
        # Interface
        - wofi
        - kitty
        - hyprqt6engine

  # --- BLOCO 3: FLATPAKS ---
  - type: default-flatpaks
    configurations:
      - notify: true
        scope: system
        install:
          - org.mozilla.firefox
          - org.gnome.Nautilus
          # Lojinha de Apps (Bazaar)
          - io.github.kolunmi.Bazaar
      - scope: user

  # --- BLOCO 4: SERVIÇOS ---
  - type: systemd
    system:
      enabled:
        - sddm
        - podman.socket

  - type: signing