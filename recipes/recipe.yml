---
# yaml-language-server: $schema=https://schema.blue-build.org/recipe-v1.json
name: fedoraland
description: Minimal Fedora Atomic Hyprland desktop.

base-image: ghcr.io/ublue-os/base-main
image-version: 44

modules:
  - type: files
    files:
      - source: system
        destination: /

  - type: dnf
    repos:
      copr:
        - cesusieh/Hyprland
    install:
      packages:
        # Session, compositor, and portals
        - hyprland
        - hyprland-uwsm
        - uwsm
        - xdg-desktop-portal
        - xdg-desktop-portal-hyprland
        - xdg-desktop-portal-gtk
        - greetd
        - tuigreet

        # Core desktop apps and shell
        - kitty
        - quickshell
        - nautilus
        - fuzzel
        - zsh

        # Hyprland desktop utilities
        - wl-clipboard
        - hyprshot
        - hyprpaper
        - hypridle
        - hyprlock
        - hyprpolkitagent

        # System and CLI basics
        - NetworkManager
        - NetworkManager-tui
        - git-core
        - curl
        - file
        - procps-ng
        - psmisc

        # Archives and compression
        - bzip2
        - gzip
        - tar
        - unzip
        - xz
        - 7zip
        - zstd

        # Audio
        - pipewire
        - wireplumber
        - pipewire-pulseaudio
        - alsa-utils
        - pavucontrol
        - playerctl
        - pamixer

        # Auth and secrets
        - polkit
        - gnome-keyring
        - gnome-keyring-pam

        # Desktop integration
        - flatpak
        - qt5-qtwayland
        - qt6-qtwayland
        - xdg-user-dirs
        - xdg-utils
        - gvfs
        - udisks2
        - adwaita-icon-theme
        - google-noto-sans-fonts
        - google-noto-emoji-fonts
    remove:
      packages:
        - firefox
        - firefox-langpacks
        - nwg-panel

  - type: script
    scripts:
      - configure-authselect.sh
      - install-starship.sh
      - install-zsh-plugins.sh

  - type: systemd
    system:
      enabled:
        - greetd.service
        - NetworkManager.service

  - type: default-flatpaks
    configurations:
      - notify: true
        scope: system
        install:
          - io.github.kolunmi.Bazaar
      - scope: user

  - type: justfiles
    validate: true
    install: true

  - type: signing
