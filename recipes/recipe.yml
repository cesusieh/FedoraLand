---
# yaml-language-server: $schema=https://schema.blue-build.org/recipe-v1.json
name: fedoraland
description: Minimal Fedora Atomic Hyprland desktop.

base-image: ghcr.io/ublue-os/base-main
image-version: 44

modules:
  - type: files
    files:
      - source: system
        destination: /

  - type: dnf
    repos:
      copr:
        - cesusieh/Hyprland
    install:
      packages:
        - hyprland
        - xdg-desktop-portal
        - xdg-desktop-portal-hyprland
        - xdg-desktop-portal-gtk
        - greetd
        - tuigreet
        - uwsm
        - hyprland-uwsm

        - kitty
        - quickshell
        - nautilus
        - fuzzel
        - zsh

        - wl-clipboard
        - hyprshot
        - hyprpaper
        - hypridle
        - hyprlock
        - hyprpolkitagent

        - flatpak
        - NetworkManager
        - NetworkManager-tui
        - git-core
        - curl
        - file
        - procps-ng
        - bzip2
        - gzip
        - tar
        - unzip
        - xz
        - 7zip
        - zstd
        - pipewire
        - wireplumber
        - pipewire-pulseaudio
        - alsa-utils
        - pavucontrol
        - playerctl
        - pamixer
        - polkit
        - gnome-keyring

        - qt5-qtwayland
        - qt6-qtwayland
        - xdg-user-dirs
        - xdg-utils
        - gvfs
        - udisks2
        - adwaita-icon-theme
        - google-noto-sans-fonts
        - google-noto-emoji-fonts
    remove:
      packages:
        - firefox
        - firefox-langpacks

  - type: script
    scripts:
      - install-starship.sh
      - install-zsh-plugins.sh

  - type: systemd
    system:
      enabled:
        - greetd.service
        - NetworkManager.service

  - type: default-flatpaks
    configurations:
      - notify: true
        scope: system
        install:
          - io.github.kolunmi.Bazaar
      - scope: user

  - type: justfiles
    validate: true
    install: true

  - type: signing
