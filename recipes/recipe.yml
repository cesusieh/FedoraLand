name: FedoraLand
description: Clean Hyprland + GTK image (Native Tooling).

base-image: ghcr.io/ublue-os/base-main
image-version: 42

modules:
  - type: files
    files:
      - source: system
        destination: /

  # --- BLOCO 1: FUNDAÇÃO DO SISTEMA & DEV TOOLS ---
  - type: dnf
    install:
      packages:
        # Core Hardware & Login
        - sddm
        - pipewire
        - wireplumber
        
        # Ferramentas Nativas Fedora Atomic
        - toolbox      # Seu container manager escolhido
        - podman       # Engine de containers
        - just         # Task runner
        
        # Utilitários de Sistema
        - git
        - fuse
        - openssl
        - ffmpeg-free
        - lshw
        
        # CLI Moderno
        - eza          # ls moderno
        - starship     # Prompt
        - micro        # Editor
        - wl-clipboard # Clipboard support
        - jq           # JSON support
        - libnotify    # Notifications
        
        # Suporte a Sistemas de Arquivo (GVFS)
        - gvfs 
        
        # Fontes & Temas
        - google-noto-sans-fonts
        - fira-code-fonts
        - adw-gtk3-theme 
        - qt6-qtwayland
        - qt5-qtwayland

  # --- BLOCO 2: ECOSSISTEMA HYPRLAND (Solopasha) ---
  - type: dnf
    repos:
      copr:
        - solopasha/hyprland
    install:
      packages:
        # Core
        - hyprland
        - hyprpaper
        - hyprlock
        - hypridle
        - xdg-desktop-portal-hyprland
        - hyprpolkitagent
        
        # Produtividade
        - hyprpicker
        - hyprsunset
        - cliphist
        - pyprland
        
        # Screenshot Suite
        - grim
        - slurp
        - hyprshot
        - satty
        
        # Interface
        - wofi
        - kitty
        - hyprqt6engine

  # --- BLOCO 3: FLATPAKS (APPS) ---
  - type: default-flatpaks
    configurations:
      - notify: true
        scope: system
        install:
          - org.mozilla.firefox
          - org.gnome.Nautilus
      - scope: user

  # --- BLOCO 4: SERVIÇOS ---
  - type: systemd
    system:
      enabled:
        - sddm
        - podman.socket

  - type: signing